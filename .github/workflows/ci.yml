name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (TypeScript + Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx biome check
      - name: Test with coverage
        run: npm run test:coverage
      - uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          flags: typescript
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt, llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev libayatana-appindicator3-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev
      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings
      - name: Format check
        working-directory: src-tauri
        run: cargo fmt --check
      - name: Test with coverage
        working-directory: src-tauri
        run: |
          mkdir -p ../coverage
          cargo llvm-cov --lcov --output-path ../coverage/lcov-rust.info
      - uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov-rust.info
          flags: rust
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
