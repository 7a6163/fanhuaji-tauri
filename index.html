<!doctype html>
<html lang="zh-Hant" data-theme="system">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>繁化姬</title>
  </head>
  <body>
    <div class="app">
      <!-- Header -->
      <header class="header">
        <span class="app-title">繁化姬</span>
        <button type="button" id="btn-settings" class="icon-btn" title="設定">
          <i class="ti ti-settings"></i>
        </button>
      </header>

      <!-- Main content -->
      <main class="main">
        <!-- Empty state: drop zone -->
        <div id="drop-zone" class="drop-zone" role="button" tabindex="0">
          <i class="ti ti-cloud-upload"></i>
          <span class="drop-title">拖放檔案到此處</span>
          <span class="drop-subtitle">或 點擊開啟檔案</span>
          <span class="drop-formats">支援 TXT、SRT、ASS、LRC、VTT、CSV、JSON、XML、HTML、MD、EPUB</span>
        </div>

        <!-- File list (shown when files exist) -->
        <div id="file-list" class="file-list hidden">
          <div id="file-items" class="file-items"></div>
          <button type="button" id="btn-add-more" class="add-more-btn">
            <i class="ti ti-plus"></i>加入更多檔案
          </button>
        </div>
      </main>

      <!-- Progress bar -->
      <div id="progress-bar-container" class="progress-bar-container">
        <div id="progress-bar" class="progress-bar"></div>
      </div>

      <!-- Status bar -->
      <footer id="status-bar" class="status-bar hidden">
        <span class="status-badge blue">全部: <span id="count-total">0</span></span>
        <span class="status-badge green">完成: <span id="count-success">0</span></span>
        <span class="status-badge red">錯誤: <span id="count-error">0</span></span>
        <span class="status-spacer"></span>
        <button type="button" id="btn-clear" class="status-action">清除列表</button>
        <button type="button" id="btn-retry" class="status-action hidden">重試失敗</button>
      </footer>

      <!-- Settings drawer -->
      <div id="settings-backdrop" class="settings-backdrop hidden"></div>
      <aside id="settings-drawer" class="settings-drawer hidden">
        <div class="drawer-header">
          <h2>設定</h2>
          <button type="button" id="btn-close-settings" class="icon-btn">
            <i class="ti ti-x"></i>
          </button>
        </div>
        <nav class="drawer-tabs">
          <button type="button" class="drawer-tab active" data-drawer-tab="convert">轉換</button>
          <button type="button" class="drawer-tab" data-drawer-tab="replace">取代</button>
          <button type="button" class="drawer-tab" data-drawer-tab="modules">模組</button>
          <button type="button" class="drawer-tab" data-drawer-tab="general">一般</button>
        </nav>
        <div class="drawer-body">
          <!-- 轉換 -->
          <div class="drawer-panel active" data-panel="convert">
            <section class="setting-section">
              <h3><i class="ti ti-transform"></i> 轉換模式</h3>
              <select id="converter">
                <optgroup label="繁簡">
                  <option value="Traditional">繁體化</option>
                  <option value="Simplified">簡體化</option>
                </optgroup>
                <optgroup label="本地化">
                  <option value="China">中國化</option>
                  <option value="Hongkong">香港化</option>
                  <option value="Taiwan" selected>台灣化</option>
                </optgroup>
                <optgroup label="其他">
                  <option value="Bopomofo">注音化</option>
                  <option value="Mars">火星化</option>
                  <option value="Pinyin">拼音化</option>
                </optgroup>
                <optgroup label="第三方服務">
                  <option value="WikiSimplified">維基簡體化</option>
                  <option value="WikiTraditional">維基繁體化</option>
                </optgroup>
              </select>
            </section>
            <section class="setting-section">
              <h3><i class="ti ti-folder"></i> 存檔選項</h3>
              <label class="setting-label">存檔資料夾</label>
              <select id="save-folder">
                <option value="same">輸入檔所在資料夾</option>
                <option value="custom">自訂資料夾…</option>
              </select>
              <label class="setting-label">命名方式</label>
              <select id="naming">
                <option value="auto">自動命名</option>
                <option value="overwrite">覆蓋原檔</option>
                <option value="suffix">加入後綴</option>
              </select>
            </section>
          </div>

          <!-- 取代 -->
          <div class="drawer-panel" data-panel="replace">
            <section class="setting-section">
              <h3><i class="ti ti-replace"></i> 自訂取代</h3>
              <label class="setting-label">轉換前取代</label>
              <textarea id="pre-replace" placeholder="搜尋=取代（每行一組）" rows="4"></textarea>
              <label class="setting-label">轉換後取代</label>
              <textarea id="post-replace" placeholder="搜尋=取代（每行一組）" rows="4"></textarea>
              <label class="setting-label">保護詞彙（不轉換）</label>
              <textarea id="protect-replace" placeholder="每行一個詞彙" rows="4"></textarea>
            </section>
          </div>

          <!-- 模組 -->
          <div class="drawer-panel" data-panel="modules">
            <section class="setting-section">
              <h3><i class="ti ti-puzzle"></i> 詞語模組</h3>
              <div id="module-categories" class="module-categories"></div>
              <div id="module-list" class="module-list"></div>
            </section>
          </div>

          <!-- 一般 -->
          <div class="drawer-panel" data-panel="general">
            <section class="setting-section">
              <h3><i class="ti ti-palette"></i> 外觀</h3>
              <div class="theme-options" id="theme-options">
                <button type="button" class="theme-option active" data-theme="system">
                  <i class="ti ti-device-desktop"></i>系統
                </button>
                <button type="button" class="theme-option" data-theme="light">
                  <i class="ti ti-sun"></i>淺色
                </button>
                <button type="button" class="theme-option" data-theme="dark">
                  <i class="ti ti-moon"></i>深色
                </button>
              </div>
            </section>
            <section class="setting-section">
              <h3><i class="ti ti-refresh"></i> 更新</h3>
              <button type="button" id="btn-check-update" class="action-btn">
                <i class="ti ti-cloud-download"></i>檢查更新
              </button>
              <span id="update-status" class="update-status"></span>
            </section>
            <section class="setting-section">
              <h3><i class="ti ti-info-circle"></i> 關於</h3>
              <div class="about-info">
                <span>版本 <span id="app-version"></span></span>
                <a class="link" data-href="https://zhconvert.org">zhconvert.org</a>
                <a class="link" data-href="https://docs.zhconvert.org/license/">授權條款</a>
                <a class="link" data-href="https://github.com/7a6163/fanhuaji-tauri">GitHub</a>
              </div>
            </section>
          </div>
        </div>
      </aside>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
