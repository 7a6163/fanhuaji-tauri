<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>繁化姬</title>
    <link rel="stylesheet" href="/node_modules/@tabler/icons-webfont/dist/tabler-icons.min.css" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div class="app">
      <!-- Header -->
      <header class="header">
        <div class="header-group info-group">
          <span class="group-title">繁化姬</span>
          <div class="group-content">
            <span>伺服器</span>
            <a id="server-url" class="link" href="#">https://api.zhconvert.org</a>
            <span>資料庫版本</span>
            <span id="dict-version" class="dict-version"></span>
          </div>
          <div class="group-footer">
            本程式使用了<a class="link" data-href="https://zhconvert.org">繁化姬</a>的 API 服務。<a class="link" data-href="https://docs.zhconvert.org/license/">商業使用請參閱繁化姬授權條款</a>。字幕中的推廣內容於免費使用時不得移除。
          </div>
        </div>
        <div class="header-group converter-group">
          <span class="group-title">轉換</span>
          <div class="group-content">
            <select id="converter">
              <optgroup label="繁簡">
                <option value="Traditional">繁體化</option>
                <option value="Simplified">簡體化</option>
              </optgroup>
              <optgroup label="本地化">
                <option value="China">中國化</option>
                <option value="Hongkong">香港化</option>
                <option value="Taiwan" selected>台灣化</option>
              </optgroup>
              <optgroup label="其他">
                <option value="Bopomofo">注音化</option>
                <option value="Mars">火星化</option>
                <option value="Pinyin">拼音化</option>
              </optgroup>
              <optgroup label="第三方服務">
                <option value="WikiSimplified">維基簡體化</option>
                <option value="WikiTraditional">維基繁體化</option>
              </optgroup>
              <optgroup label="App 限定模式">
                <option value="_encodingOnly">僅轉換字符編碼</option>
                <option value="_renameOnly">僅修改檔案名稱</option>
              </optgroup>
            </select>
          </div>
        </div>
      </header>

      <!-- Tabs -->
      <nav class="tabs">
        <button type="button" class="tab active" data-tab="file-list">檔案清單</button>
        <button type="button" class="tab" data-tab="save-options">存檔選項</button>
        <button type="button" class="tab" data-tab="modules">詞語模組</button>
        <button type="button" class="tab" data-tab="custom-replace">自訂取代</button>
        <button type="button" class="tab" data-tab="file-preview">檔案預覽</button>
        <button type="button" class="tab" data-tab="settings">設定</button>
      </nav>

      <!-- Tab Content -->
      <div class="tab-content">
        <!-- 檔案清單 -->
        <div id="tab-file-list" class="tab-panel active">
          <div class="file-list-layout">
            <div class="table-container">
              <table id="file-table">
                <thead>
                  <tr>
                    <th>輸入路徑</th>
                    <th>輸入檔名</th>
                    <th>字元編碼</th>
                    <th>狀態</th>
                    <th>系統訊息</th>
                    <th>輸出檔名</th>
                    <th>輸出路徑</th>
                  </tr>
                </thead>
                <tbody id="file-table-body">
                </tbody>
              </table>
            </div>
            <div class="file-actions">
              <button type="button" id="btn-open" class="action-btn">
                <i class="ti ti-folder-open"></i>開啟檔案…
              </button>
              <button type="button" id="btn-remove-all" class="action-btn">
                <i class="ti ti-trash"></i>刪除所有
              </button>
              <button type="button" id="btn-remove-done" class="action-btn">
                <i class="ti ti-circle-check"></i>刪除已完成
              </button>
              <button type="button" id="btn-reset-errors" class="action-btn">
                <i class="ti ti-refresh"></i>重設錯誤
              </button>
              <button type="button" id="btn-convert-all" class="action-btn convert-btn">
                <i class="ti ti-transform"></i>轉換所有
              </button>
            </div>
          </div>
        </div>

        <!-- 存檔選項 -->
        <div id="tab-save-options" class="tab-panel">
          <div class="options-form">
            <div class="form-row">
              <label>存檔資料夾</label>
              <select id="save-folder">
                <option value="same">輸入檔所在資料夾</option>
                <option value="custom">自訂資料夾…</option>
              </select>
            </div>
            <hr />
            <div class="form-row">
              <label>命名方式</label>
              <select id="naming">
                <option value="auto">自動命名</option>
                <option value="overwrite">覆蓋原檔</option>
                <option value="suffix">加入後綴</option>
              </select>
            </div>
          </div>
        </div>

        <!-- 詞語模組 -->
        <div id="tab-modules" class="tab-panel">
          <div class="modules-header">
            <select id="module-default">
              <option value="auto">自動偵測</option>
              <option value="enable">全部啟用</option>
              <option value="disable">全部停用</option>
            </select>
            <button type="button" id="btn-global-setting" class="text-btn">全域設定</button>
            <button type="button" id="btn-apply-all" class="text-btn">一次設定所有選項</button>
          </div>
          <div class="modules-layout">
            <div class="module-categories" id="module-categories">
            </div>
            <div class="module-list" id="module-list">
            </div>
          </div>
        </div>

        <!-- 自訂取代 -->
        <div id="tab-custom-replace" class="tab-panel">
          <div class="replace-section">
            <h3>轉換前取代（Pre-Replace）</h3>
            <textarea id="pre-replace" placeholder="格式：搜尋=取代（每行一組）" rows="5"></textarea>
          </div>
          <div class="replace-section">
            <h3>轉換後取代（Post-Replace）</h3>
            <textarea id="post-replace" placeholder="格式：搜尋=取代（每行一組）" rows="5"></textarea>
          </div>
          <div class="replace-section">
            <h3>保護詞彙（不轉換）</h3>
            <textarea id="protect-replace" placeholder="每行一個詞彙" rows="5"></textarea>
          </div>
        </div>

        <!-- 檔案預覽 -->
        <div id="tab-file-preview" class="tab-panel">
          <div class="preview-sidebar">
            <button type="button" class="preview-nav active" data-preview="file-info">
              <i class="ti ti-info-circle"></i>檔案資訊
            </button>
            <button type="button" class="preview-nav" data-preview="input-preview">
              <i class="ti ti-file-import"></i>輸入檔案預覽
            </button>
            <button type="button" class="preview-nav" data-preview="output-preview">
              <i class="ti ti-file-export"></i>輸出檔案預覽
            </button>
            <button type="button" class="preview-nav" data-preview="diff-view">
              <i class="ti ti-arrows-diff"></i>差異比較
            </button>
            <button type="button" class="preview-nav" data-preview="convert-info">
              <i class="ti ti-list-details"></i>轉換資訊
            </button>
          </div>
          <div class="preview-content" id="preview-content">
            <p class="placeholder-text">在檔案清單內雙擊字幕以獲得輸入檔案資訊</p>
          </div>
        </div>

        <!-- 設定 -->
        <div id="tab-settings" class="tab-panel">
          <div class="settings-form">
            <h3><i class="ti ti-palette"></i> 外觀</h3>
            <div class="setting-row">
              <label>主題</label>
              <div class="theme-options" id="theme-options">
                <button type="button" class="theme-option active" data-theme="system">
                  <i class="ti ti-device-desktop"></i>系統
                </button>
                <button type="button" class="theme-option" data-theme="light">
                  <i class="ti ti-sun"></i>淺色
                </button>
                <button type="button" class="theme-option" data-theme="dark">
                  <i class="ti ti-moon"></i>深色
                </button>
              </div>
            </div>

            <hr />

            <h3><i class="ti ti-refresh"></i> 更新</h3>
            <div class="setting-row">
              <label>應用程式更新</label>
              <div class="setting-actions">
                <button type="button" id="btn-check-update" class="action-btn">
                  <i class="ti ti-cloud-download"></i>檢查更新
                </button>
                <span id="update-status" class="setting-hint"></span>
              </div>
            </div>

            <hr />

            <h3><i class="ti ti-info-circle"></i> 關於</h3>
            <div class="setting-row">
              <label>版本</label>
              <span id="app-version" class="setting-value"></span>
            </div>
            <div class="setting-row">
              <label>繁化姬 API</label>
              <span class="setting-value">
                <a class="link" data-href="https://zhconvert.org">zhconvert.org</a>
              </span>
            </div>
            <div class="setting-row">
              <label>服務條款</label>
              <span class="setting-value">
                <a class="link" data-href="https://docs.zhconvert.org/license/">docs.zhconvert.org/license</a>
              </span>
            </div>
            <div class="setting-row">
              <label>原始碼</label>
              <span class="setting-value">
                <a class="link" data-href="https://github.com/7a6163/fanhuaji-tauri">GitHub</a>
              </span>
            </div>
          </div>
        </div>
      </div>

      <!-- Drop overlay -->
      <div id="drop-overlay" class="drop-overlay">拖放檔案到此處</div>

      <!-- Status Bar -->
      <footer class="status-bar">
        <span class="status-badge blue">全部: <span id="count-total">0</span></span>
        <span class="status-badge yellow">待轉換: <span id="count-pending">0</span></span>
        <span class="status-badge green">成功轉換: <span id="count-success">0</span></span>
        <span class="status-badge red">錯誤: <span id="count-error">0</span></span>
      </footer>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
